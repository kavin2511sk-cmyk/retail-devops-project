name: RetailApp CI — Build, Test & Push

permission:
  contents: write

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - "docker/**"
      - "k8/**"
  pull_request:
    branches: [main]

env:
  REGISTRY:   docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/retail-app

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flake8

      - name: Lint with flake8
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || echo "No tests found — skipping"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      security-events: write   # For SARIF upload

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Buildx (multi-platform support) ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login ────────────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Generate tags & labels ───────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tag: main → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Short SHA tag for traceability: sha-abc1234
            type=sha,prefix=sha-,format=short
            # Semver tags when a Git tag is pushed: v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── Build & Push ─────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scan with Trivy ─────────────────────────────────────────
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 — Update K8s Manifest (GitOps trigger for ArgoCD)
  # ─────────────────────────────────────────────────────────────────────────
  update-manifest:
    name: Update K8s Image Tag (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update deployment image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_IMAGE="${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          echo "Updating image to: $NEW_IMAGE"

          # Replace the image line in deployment.yaml
          sed -i "s|image: .*retail-app.*|image: ${NEW_IMAGE}|g" k8/deployment.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8/deployment.yaml
          git commit -m "ci: update retail-app image to sha-${SHORT_SHA} [skip ci]"
          git push
