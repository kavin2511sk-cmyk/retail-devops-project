---
apiVersion: v1
kind: Namespace
metadata:
  name: retail
  labels:
    name: retail
    monitoring: enabled

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-app-config
  namespace: retail
  labels:
    app: retail-app
data:
  APP_ENV: "production"

---
# Horizontal Pod Autoscaler — scale between 3–10 pods based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: retail-app-hpa
  namespace: retail
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: retail-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
